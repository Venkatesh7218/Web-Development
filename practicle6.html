<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seminar Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    fieldset {
      margin-bottom: 15px;
      border-radius: 5px;
      padding: 10px;
    }
    legend {
      font-weight: bold;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    .inline {
      width: auto;
      margin-right: 10px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<form>
  <fieldset>
    <legend>Personal Details</legend>

    <label>Full Name:</label>
    <input type="text" name="name" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>Phone:</label>
    <input type="tel" name="phone">
  </fieldset>

  <fieldset>
    <legend>Gender</legend>

    <label><input type="radio" name="gender" class="inline"> Male</label>
    <label><input type="radio" name="gender" class="inline"> Female</label>
    <label><input type="radio" name="gender" class="inline"> Other</label>
  </fieldset>

  <fieldset>
    <legend>Topics Interested</legend>

    <label><input type="checkbox" class="inline"> AI</label>
    <label><input type="checkbox" class="inline"> Web Development</label>
    <label><input type="checkbox" class="inline"> Cyber Security</label>
  </fieldset>

  <fieldset>
    <legend>Seminar Selection</legend>

    <label>Select Session:</label>
    <select>
      <option>Morning Session</option>
      <option>Afternoon Session</option>
      <option>Evening Session</option>
    </select>
  </fieldset>

  <button type="submit">Register</button>
</form>

</body>
</html>
