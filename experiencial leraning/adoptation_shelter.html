<!DOCTYPE html>
<html>
<head>
    <title>Animal Shelter Adoption</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-content">
        <h1>🐾 Animal Shelter</h1>
        <p>Adopt. Love. Care.</p>
    </div>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Adopt</a>
    <a href="#">Contact</a>
</nav>

<section class="filters">
    <input type="radio" name="filter" id="all" checked>
    <label for="all">All Pets</label>

    <input type="radio" name="filter" id="dogs">
    <label for="dogs">Dogs</label>

    <input type="radio" name="filter" id="cats">
    <label for="cats">Cats</label>
</section>

<section class="pet-container">

    <div class="card dog">
        <img src="https://images.unsplash.com/photo-1552053831-71594a27632d">
        <div class="info">
            <h3>Buddy</h3>
            <p>Labrador • 2 years</p>
            <button>Adopt</button>
        </div>
    </div>

    <div class="card cat">
        <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131">
        <div class="info">
            <h3>Whiskers</h3>
            <p>Persian • 1 year</p>
            <button>Adopt</button>
        </div>
    </div>

    <div class="card dog">
        <img src="https://images.unsplash.com/photo-1507149833265-60c372daea22">
        <div class="info">
            <h3>Max</h3>
            <p>Beagle • 3 years</p>
            <button>Adopt</button>
        </div>
    </div>

    <div class="card cat">
        <img src="https://images.unsplash.com/photo-1494256997604-768d1f608cac">
        <div class="info">
            <h3>Luna</h3>
            <p>Siamese • 2 years</p>
            <button>Adopt</button>
        </div>
    </div>

</section>

<footer>
    <p>© Animal Shelter | Designed by Venkatesh</p>
</footer>

</body>
</html>
