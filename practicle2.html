<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple HTML Layout</title>
</head>
<body>

    <header>
        <h1>My Website Header</h1>
        <nav>
            <a href="#">Home</a> |
            <a href="#">About</a> |
            <a href="#">Contact</a>
        </nav>
    </header>

    <section>
        <article>
            <h2>Article Title</h2>
            <p>This is a short article inside a section.</p>
        </article>

        <article>
            <h2>Another Article</h2>
            <p>This is another article inside the same section.</p>
        </article>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
