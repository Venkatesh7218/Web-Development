<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
    }

    /* Navbar */
    nav {
      background-color: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Layout */
    .container {
      display: flex;
      margin: 20px;
      gap: 20px;
    }

    .sidebar {
      width: 30%;
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ccc;
      text-align: center;
    }

    .content {
      width: 70%;
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ccc;
    }

    /* Profile Image */
    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #333;
    }

    /* Text Styling */
    h2 {
      color: #333;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    /* Footer */
    footer {
      text-align: center;
      background: #333;
      color: white;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Contact</a>
  </nav>

  <!-- Layout -->
  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <img src="https://via.placeholder.com/120" alt="Profile Picture">
      <h2>Venkatesh Chincholkar</h2>
      <p>Student / Developer</p>
    </div>

    <!-- Main Content -->
    <div class="content">
      <h2>About Me</h2>
      <p>I am a beginner learning web development. I like creating simple HTML and CSS projects.</p>

      <h2>Skills</h2>
      <p>HTML, CSS, Basic JavaScript</p>

      <h2>Contact</h2>
      <p>Email: Chincholkar@email.com</p>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Profile Page</p>
  </footer>

</body>
</html>
